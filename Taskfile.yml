version: '3'

# polozi-monorepo task runner
#   task            -> db + backend + main app + backoffice (core dev stack)
#   task all        -> everything incl. landing
#   task api        -> Rust backend            :3001  (/swagger)
#   task app        -> main web app            :3002
#   task backoffice -> admin backoffice        :3003
#   task landing    -> marketing landing       :3000
#   task db:up      -> start postgres
#   task down       -> stop postgres
#   task test       -> run backend test suite (fast, needs db)
#   task test:api   -> run Rust backend e2e tests (needs db)
#   task test:e2e   -> run Playwright e2e in Docker (full stack, self-contained)

vars:
  COMPOSE: docker compose
  PG_USER: polozi
  # Postgres is published on host port 5433 (see docker-compose.yml)
  TEST_DATABASE_URL: postgres://polozi:polozi@localhost:5433/polozi

tasks:
  default:
    desc: Start db, backend, main app and backoffice together
    deps: [api, app, backoffice]

  all:
    desc: Start the whole stack incl. landing
    deps: [api, app, backoffice, landing]

  install:
    desc: Install JS dependencies
    cmds:
      - pnpm install

  db:up:
    desc: Start postgres (detached)
    cmds:
      - '{{.COMPOSE}} up -d postgres'

  db:wait:
    desc: Wait until postgres is accepting connections
    deps: [db:up]
    cmds:
      - |
        echo "waiting for postgres..."
        for i in $(seq 1 60); do
          if {{.COMPOSE}} exec -T postgres pg_isready -U {{.PG_USER}} >/dev/null 2>&1; then
            echo "postgres is ready"
            exit 0
          fi
          sleep 1
        done
        echo "postgres did not become ready in time" >&2
        exit 1

  db:down:
    desc: Stop postgres
    cmds:
      - '{{.COMPOSE}} stop postgres'

  db:reset:
    desc: Wipe postgres data and recreate it
    cmds:
      - '{{.COMPOSE}} down -v'
      - task: db:wait

  api:
    desc: 'Run the Rust backend (:3001, waits for db)'
    deps: [db:wait]
    dir: apps/api
    cmds:
      - cargo run

  app:
    desc: 'Run the main web app (:3002)'
    dir: apps/app
    cmds:
      - pnpm dev

  backoffice:
    desc: 'Run the admin backoffice (:3003)'
    dir: apps/backoffice
    cmds:
      - pnpm dev

  landing:
    desc: 'Run the marketing landing (:3000)'
    dir: apps/landing
    cmds:
      - pnpm dev

  test:
    desc: Run all test suites
    deps: [test:api]

  test:api:
    desc: 'Run the Rust backend e2e tests (waits for db, isolated test DBs)'
    deps: [db:wait]
    dir: apps/api
    env:
      TEST_DATABASE_URL: '{{.TEST_DATABASE_URL}}'
    cmds:
      - cargo test

  test:e2e:
    desc: 'Run Playwright e2e in Docker (full stack: db+api+app+backoffice)'
    cmds:
      - |
        set -e
        # Hermetic credentials: the stack pulls only public images, so use a
        # throwaway docker config with no credsStore. This keeps the run
        # independent of private-registry logins and sidesteps broken
        # credential helpers (e.g. docker-credential-desktop under WSL).
        CFG="$(mktemp -d)"
        printf '{"auths":{}}' > "$CFG/config.json"
        export DOCKER_CONFIG="$CFG"
        C="{{.COMPOSE}} -f docker-compose.e2e.yml -p polozi-e2e"
        trap '$C down -v --remove-orphans >/dev/null 2>&1 || true; rm -rf "$CFG"' EXIT
        $C down -v --remove-orphans >/dev/null 2>&1 || true
        $C up --build --exit-code-from playwright

  test:e2e:local:
    desc: 'Run Playwright e2e locally against running dev servers (task dev)'
    dir: e2e
    cmds:
      - npm install
      - npx playwright install chromium
      - npx playwright test

  test:e2e:ui:
    desc: 'Open Playwright UI mode locally (needs dev servers running)'
    dir: e2e
    cmds:
      - npm install
      - npx playwright install chromium
      - npx playwright test --ui

  build:
    desc: Build all apps (turbo) + release backend
    cmds:
      - pnpm build

  down:
    desc: Stop all docker services
    cmds:
      - '{{.COMPOSE}} down'
