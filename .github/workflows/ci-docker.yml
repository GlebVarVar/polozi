name: CI — Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile.web"
      - "nginx.web.conf"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-docker.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile.web"
      - "nginx.web.conf"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-docker.yml"

# On PRs: build only (validate Dockerfiles). On main: build + push.
# api/backoffice go to the self-hosted registry (needs REGISTRY_USERNAME /
# REGISTRY_PASSWORD from the `prod` environment matching its htpasswd);
# app/landing stay on GHCR.
#
# The `prod` environment holds:
#   - var  API_URL           -> baked into app/backoffice as NEXT_PUBLIC_API_URL
#   - secret REGISTRY_USERNAME / REGISTRY_PASSWORD -> self-hosted registry login
# It is used only on push (build + push); PRs build without it so environment
# protection rules never block Dockerfile validation.
jobs:
  images:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name != 'pull_request' && 'prod' || '' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            registry: registry.dicedev.rs
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            build_args: ""
          - image: app
            registry: registry.dicedev.rs
            context: .
            dockerfile: ./Dockerfile.web
            build_args: APP=app
          - image: backoffice
            registry: registry.dicedev.rs
            context: .
            dockerfile: ./Dockerfile.web
            build_args: APP=backoffice
          # - image: landing
          #   registry: ghcr.io
          #   context: .
          #   dockerfile: ./Dockerfile.web
          #   build_args: APP=landing
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # GHCR repository names must be lowercase; the owner may contain uppercase.
      - name: Compute image name
        id: img
        run: |
          if [ "${{ matrix.registry }}" = "ghcr.io" ]; then
            echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/polozi-${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ matrix.registry }}/polozi/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ${{ matrix.registry }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry }}
          username: ${{ matrix.registry == 'ghcr.io' && github.actor || secrets.REGISTRY_USERNAME }}
          password: ${{ matrix.registry == 'ghcr.io' && secrets.GITHUB_TOKEN || secrets.REGISTRY_PASSWORD }}

      - name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }} ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Static export bakes NEXT_PUBLIC_API_URL at build time, so the prod
          # API URL must be passed here. Web images only; skipped when API_URL
          # is unset (e.g. PR builds) so the Dockerfile default is used instead.
          build-args: |
            ${{ matrix.build_args }}
            ${{ (matrix.image != 'api' && vars.API_URL != '') && format('NEXT_PUBLIC_API_URL={0}', vars.API_URL) || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
