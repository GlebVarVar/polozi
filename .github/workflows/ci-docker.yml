name: CI — Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile.web"
      - "nginx.web.conf"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-docker.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile.web"
      - "nginx.web.conf"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-docker.yml"

# On PRs: build only (validate Dockerfiles). On main: build + push to GHCR.
jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            build_args: ""
          - image: app
            context: .
            dockerfile: ./Dockerfile.web
            build_args: APP=app
          - image: backoffice
            context: .
            dockerfile: ./Dockerfile.web
            build_args: APP=backoffice
          - image: landing
            context: .
            dockerfile: ./Dockerfile.web
            build_args: APP=landing
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # GHCR repository names must be lowercase; the owner may contain uppercase.
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/polozi-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }} ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
