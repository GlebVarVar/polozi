# Self-contained e2e stack: throwaway Postgres -> API -> static web apps ->
# a Playwright runner that drives them over the compose network by service DNS.
#
#   docker compose -f docker-compose.e2e.yml -p polozi-e2e up --build \
#     --exit-code-from playwright
#
# The web apps are static exports with NEXT_PUBLIC_API_URL baked at build time,
# so they are rebuilt here to point the browser at http://api:3001 (reachable
# from inside the Playwright container), not the host-published port.
name: polozi-e2e

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: polozi
      POSTGRES_PASSWORD: polozi
      POSTGRES_DB: polozi
      # postgres:18 moved the default PGDATA to a version subdir; pin it back to
      # the mounted path so the entrypoint uses the tmpfs instead of aborting
      # with "unused mount/volume" at /var/lib/postgresql/data.
      PGDATA: /var/lib/postgresql/data
    # Ephemeral data — every run starts from a clean database.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polozi"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgres://polozi:polozi@postgres:5432/polozi
      PORT: "3001"
      RUST_LOG: info
      JWT_SECRET: e2e-insecure-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 40

  # Service name is intentionally NOT "app": the entire ".app" gTLD is in
  # Chromium's HSTS preload list, so a browser force-upgrades http://app to
  # https://app (port 443) and gets ECONNREFUSED. "webapp" is safe.
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        APP: app
        NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy

  backoffice:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        APP: backoffice
        NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /e2e
    environment:
      APP_URL: http://webapp
      BO_URL: http://backoffice
      API_URL: http://api:3001
      CI: "1"
      # npm cache lives in a named volume (fast reuse across runs) instead of
      # the mounted repo, so no .npm/ cache or debug logs land in ./e2e.
      npm_config_cache: /npm-cache
    volumes:
      - ./e2e:/e2e
      # Anything the (root) container writes goes into anonymous volumes, NOT the
      # bind mount, so no root-owned files land in the host repo (which would
      # break a later host-side `npm install` / local run with EACCES).
      - /e2e/node_modules
      - /e2e/test-results
      - /e2e/playwright-report
      - pw-npm-cache:/npm-cache
    depends_on:
      api:
        condition: service_healthy
      webapp:
        condition: service_started
      backoffice:
        condition: service_started
    command:
      - sh
      - -c
      # --no-package-lock: don't write a root-owned lock file into the bind mount.
      - npm install --no-audit --no-fund --no-package-lock && npx playwright test

volumes:
  pw-npm-cache:
